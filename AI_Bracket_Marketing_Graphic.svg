  <text x="600" y="912" text-anchor="middle" fill="#7d8598" font-size="14" font-style="italic">
    <tspan x="600" dy="0">* Always a 3-way comparison: 33% = no better than a random guess among the 3, 100% = certain.</tspan>
    <tspan x="600" dy="20">55-65% is a clear, decisive edge — not a weak score.</tspan>
  </text>

  <line x1="90" y1="968" x2="1110" y2="968" stroke="#24304a" stroke-width="1"/>

  <!-- footer -->
  <text x="600" y="1004" text-anchor="middle" fill="#7d8598" font-size="15">Fictional tickers (ABC-YZA) for illustration only.</text>
  <text x="600" y="1028" text-anchor="middle" fill="#7d8598" font-size="15">The daily top 9 stocks are chosen by deterministic scoring — not by AI.</text>
  <text x="600" y="1060" text-anchor="middle" fill="#5f6779" font-size="13">Not financial advice. Educational and informational purposes only.</text>

  <text x="600" y="1104" text-anchor="middle" fill="#f5f7fa" font-size="20" font-weight="bold" letter-spacing="1">BLUE CHIP SWING TRADER™</text>
  <text x="600" y="1130" text-anchor="middle" fill="#2dd4bf" font-size="16">bluechipswingtrader.com</text>
