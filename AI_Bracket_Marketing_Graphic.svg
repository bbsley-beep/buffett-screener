  <text x="600" y="508" text-anchor="middle" fill="#f2a623" font-size="13" font-weight="bold" letter-spacing="1">WINNER</text>
  <text x="960" y="508" text-anchor="middle" fill="#f2a623" font-size="13" font-weight="bold" letter-spacing="1">WINNER</text>

