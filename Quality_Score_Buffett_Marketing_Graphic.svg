    <tspan x="600" dy="20">with Warren Buffett, Berkshire Hathaway Inc., or any of their subsidiaries.</tspan>
  </text>

  <line x1="90" y1="1198" x2="1110" y2="1198" stroke="#24304a" stroke-width="1"/>

  <!-- footer -->
  <text x="600" y="1232" text-anchor="middle" fill="#5f6779" font-size="13">Not financial advice. Educational and informational purposes only.</text>

  <text x="600" y="1264" text-anchor="middle" fill="#f5f7fa" font-size="20" font-weight="bold" letter-spacing="1">BLUE CHIP SWING TRADER™</text>
  <text x="600" y="1288" text-anchor="middle" fill="#2dd4bf" font-size="16">bluechipswingtrader.com</text>
