  <text x="824" y="284" fill="#f5f7fa" font-size="18" font-weight="bold">Low debt-to-equity</text>
  <text x="824" y="310" fill="#9aa3b5" font-size="14">Manageable leverage</text>

  <!-- Row 2 -->
  <rect x="80" y="360" width="320" height="90" rx="8" fill="#141b2e" stroke="#2d5a8f" stroke-width="1"/>
