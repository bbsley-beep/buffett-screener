<svg width="1200" height="1290" viewBox="0 0 1200 1290" xmlns="http://www.w3.org/2000/svg" font-family="Liberation Sans, Arial, sans-serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M1 1L8 5L1 9" fill="none" stroke="#4a5570" stroke-width="1.6"/>
