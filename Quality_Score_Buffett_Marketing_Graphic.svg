  <text x="600" y="988" text-anchor="middle" fill="#7d8598" font-size="14" font-style="italic">* RSI only counts once the Tech score itself is strong.</text>

  <line x1="90" y1="1018" x2="1110" y2="1018" stroke="#24304a" stroke-width="1"/>

