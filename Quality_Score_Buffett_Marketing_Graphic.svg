  <text x="464" y="424" fill="#9aa3b5" font-size="14">Low P/E or price-to-book</text>

  <rect x="800" y="360" width="320" height="90" rx="8" fill="#141b2e" stroke="#2d5a8f" stroke-width="1"/>
  <text x="824" y="398" fill="#f5f7fa" font-size="18" font-weight="bold">DCF margin of safety</text>
  <text x="824" y="424" fill="#9aa3b5" font-size="14">Price vs. intrinsic value</text>

  <!-- scoring notes -->
  <text x="600" y="486" text-anchor="middle" fill="#f5f7fa" font-size="19" font-weight="bold">Score = % of available points earned</text>
