  <text x="340" y="748" text-anchor="middle" fill="#f5f7fa" font-size="26" font-weight="bold">20%</text>

  <text x="470" y="736" text-anchor="middle" fill="#2dd4bf" font-size="26" font-weight="bold">+</text>

  <rect x="500" y="692" width="200" height="70" rx="8" fill="#141b2e" stroke="#24304a" stroke-width="1"/>
  <text x="600" y="720" text-anchor="middle" fill="#9aa3b5" font-size="14">Tech</text>
  <text x="600" y="748" text-anchor="middle" fill="#f5f7fa" font-size="26" font-weight="bold">50%</text>

  <text x="730" y="736" text-anchor="middle" fill="#2dd4bf" font-size="26" font-weight="bold">+</text>

  <rect x="760" y="692" width="200" height="70" rx="8" fill="#141b2e" stroke="#24304a" stroke-width="1"/>
  <text x="860" y="720" text-anchor="middle" fill="#9aa3b5" font-size="14">RSI*</text>
  <text x="860" y="748" text-anchor="middle" fill="#f5f7fa" font-size="26" font-weight="bold">30%</text>

  <line x1="600" y1="762" x2="600" y2="790" stroke="#4a5570" stroke-width="1.6" marker-end="url(#arrow2)"/>

